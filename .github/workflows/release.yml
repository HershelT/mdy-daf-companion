name: Release MDY Daf Companion

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after verification
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish_auth:
        description: npm publish authentication mode
        required: true
        default: "trusted-publishing"
        type: choice
        options:
          - "trusted-publishing"
          - "npm-token-bootstrap"

permissions:
  contents: read

jobs:
  verify-and-publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mdy-daf-companion/package-lock.json
      - name: Install dependencies
        working-directory: mdy-daf-companion
        run: npm ci
      - name: Verify release package
        working-directory: mdy-daf-companion
        run: npm run release:prepare
      - name: Publish to npm with trusted publishing
        if: ${{ inputs.publish == 'true' && inputs.publish_auth == 'trusted-publishing' }}
        working-directory: mdy-daf-companion
        run: npm run release:publish
      - name: Publish to npm with bootstrap token
        if: ${{ inputs.publish == 'true' && inputs.publish_auth == 'npm-token-bootstrap' }}
        working-directory: mdy-daf-companion
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm run release:publish
