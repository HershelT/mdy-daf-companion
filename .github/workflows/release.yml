name: Release MDY Daf Companion

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after verification
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  TZ: America/Chicago

jobs:
  verify-and-publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: mdy-daf-companion/package-lock.json
      - name: Install dependencies
        working-directory: mdy-daf-companion
        run: npm ci
      - name: Verify release package
        working-directory: mdy-daf-companion
        run: npm run release:prepare
      - name: Publish to npm with trusted publishing
        if: ${{ inputs.publish == 'true' }}
        working-directory: mdy-daf-companion
        run: npm run release:publish
